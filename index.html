<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { main: ['DM Sans', 'sans-serif'] },
          colors: {
            lila: { 50:'#f3f0ff', 100:'#e9e3ff', 200:'#d4c8ff', 300:'#b8a4f8', 400:'#9b7eef', 500:'#7c5ce7' },
            menta: { 50:'#e8faf5', 100:'#c6f4e4', 200:'#81e6c9', 300:'#55d4af', 400:'#38c89a', 500:'#22a982' },
            durazno: { 50:'#fff5ed', 100:'#ffe8d6', 200:'#ffd0a8', 300:'#ffb87a', 400:'#ffa04c', 500:'#f9842b' },
            azul: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd', 400:'#60a5fa', 500:'#2563eb' },
            rosa: { 50:'#fdf2f8', 100:'#fce7f3', 200:'#fbcfe8', 300:'#f3a7cf', 400:'#e58ac0', 500:'#dc7ab5' },
            aqua: { 50:'#edf9f3', 100:'#dbf3e6', 200:'#b8e7cc', 300:'#8fd9af', 400:'#67cb97', 500:'#3ebf86', 600:'#2faa74' }
          }
        }
      }
    };
  </script>
  <style>
    html, body { height:100%; margin:0; font-family:'DM Sans', sans-serif; }
    * { box-sizing:border-box; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

    .month-tab { transition:all .15s; }
    .month-tab:hover { background:#f3f0ff; }
    .month-tab.active { background:#7c5ce7; color:white; }
    .card-shadow { box-shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); }
    .modal-bg { background:rgba(0,0,0,.30); }
    .cal-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
    .progress-bar { transition:width .3s; }
    input, select, textarea { font-family:'DM Sans', sans-serif; }
  </style>
</head>
<body class="h-full bg-gray-50 font-main text-gray-700">
  <div class="h-full w-full flex overflow-hidden">
    <aside class="w-60 min-w-[240px] bg-white border-r border-gray-100 flex flex-col h-full min-h-0 overflow-y-auto">
      <div class="p-4 border-b border-gray-100 shrink-0"><h1 class="text-lg font-bold text-lila-500 flex items-center gap-2"><i data-lucide="wallet" class="w-5 h-5"></i><span>Mi plan de pagos</span></h1></div>
      <nav class="shrink-0 p-2.5 space-y-1" id="sideNav">
        <button class="sidebar-item active w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="dashboard"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Dashboard</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="monthly"><i data-lucide="calendar" class="w-4 h-4"></i>Vista mensual</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="biweekly"><i data-lucide="calendar-range" class="w-4 h-4"></i>Vista quincenal</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="fixed"><i data-lucide="pin" class="w-4 h-4"></i>Pagos fijos</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="installments"><i data-lucide="layers" class="w-4 h-4"></i>Pagos a meses</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="variable"><i data-lucide="shuffle" class="w-4 h-4"></i>Pagos variados</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="savings"><i data-lucide="piggy-bank" class="w-4 h-4"></i>Ahorro</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="annual"><i data-lucide="bar-chart-3" class="w-4 h-4"></i>Resumen anual</button>
        <button class="sidebar-item w-full text-left px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2" data-view="config"><i data-lucide="settings" class="w-4 h-4"></i>Configuración</button>
      </nav>
      <div class="shrink-0 p-3 m-2 rounded-xl bg-lila-50 border border-lila-100">
        <div id="sidebarSavingsTitle" class="text-xs font-semibold text-lila-500 mb-1">Meta de ahorro mensual</div>
        <div id="sidebarSavingsGoal" class="text-lg font-bold text-lila-500 leading-tight">$0</div>
        <div class="text-xs text-gray-500 mt-0.5">Ahorrado: <span id="sidebarSaved" class="font-semibold text-menta-400">$0</span></div>
        <div class="w-full bg-lila-100 rounded-full h-1.5 mt-2"><div id="sidebarProgress" class="bg-lila-400 h-1.5 rounded-full progress-bar" style="width:0%"></div></div>
      </div>
      <div class="relative overflow-hidden shrink-0 p-3 m-2 mt-0 rounded-xl bg-white border border-gray-100 card-shadow">
        <div class="absolute right-3 bottom-3 flex items-end gap-1 opacity-20 pointer-events-none"><span class="w-1.5 h-5 rounded-full bg-azul-300"></span><span class="w-1.5 h-8 rounded-full bg-lila-300"></span><span class="w-1.5 h-6 rounded-full bg-menta-300"></span><span class="w-1.5 h-10 rounded-full bg-durazno-300"></span></div>
        <div class="relative text-xs font-semibold text-gray-500 mb-1">Ahorro total acumulado</div>
        <div id="sidebarTotalSavings" class="relative text-lg font-bold text-azul-400 leading-tight">$0</div>
        <div class="relative text-[11px] text-gray-400 mt-0.5">De todos los meses</div>
      </div>
    </aside>
    <main class="flex-1 h-full overflow-y-auto overflow-x-hidden">
      <div class="bg-white border-b border-gray-100 px-4 py-2 flex gap-1 overflow-x-auto" id="monthTabs"></div>
      <div class="p-5 space-y-5" id="mainContent"></div>
    </main>
  </div>

  <div id="modal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90%] overflow-y-auto card-shadow" id="modalContent"></div>
  </div>
  <div id="deleteConfirm" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm card-shadow text-center">
      <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-3"><i data-lucide="trash-2" class="w-6 h-6 text-red-400"></i></div>
      <h3 class="font-bold text-gray-800 mb-2">¿Eliminar registro?</h3><p class="text-sm text-gray-500 mb-4">Esta acción no se puede deshacer.</p>
      <div class="flex gap-2 justify-center"><button onclick="closeDeleteConfirm()" class="px-4 py-2 rounded-lg bg-gray-100 text-sm font-medium hover:bg-gray-200">Cancelar</button><button id="confirmDeleteBtn" class="px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600">Eliminar</button></div>
    </div>
  </div>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
const DEFAULT_CATEGORIES=['vivienda','servicios','suscripciones','educación','transporte','comida','salud','entretenimiento','compras','ahorro','otros'];
const CATEGORIES=DEFAULT_CATEGORIES;
const ACCOUNT_TYPES=['débito','crédito','efectivo','cuenta de ahorro','otro'];
const STORAGE_KEY='miplandepagos_estable_status_v4';
let state={
  currentMonth:5,currentYear:2026,
  config:{salaryMonthly:20000,salaryBiweekly:10000,payDate1:1,payDate2:16,savingsGoal:5000,currency:'MXN',yearEndExtras:{bonusEstimated:0,bonusReal:0,savingsFundEstimated:0,savingsFundReal:0,otherName:'Otro extra',otherEstimated:0,otherReal:0,notes:''}},
  fixed:[{id:'f1',concept:'Internet',category:'servicios',date:7,amount:1200,card:'BBVA',splitMode:'Dividir en dos quincenas',startMonth:5,startYear:2026,hasEndDate:false,month:5,year:2026,monthlyStatus:{}},{id:'f2',concept:'Renta',category:'vivienda',date:3,amount:7500,card:'BBVA',splitMode:'Cargar completo en Q1',startMonth:5,startYear:2026,hasEndDate:false,month:5,year:2026,monthlyStatus:{}}],
  installments:[{id:'i1',concept:'Laptop',totalAmount:18000,totalMonths:6,startMonth:4,startYear:2026,amount:3000,quincenaAmount:1500,purchaseCard:'Nu',card:'BBVA',status:'pendiente',notes:'Equipo de trabajo',splitMode:'Dividir en dos quincenas',month:4,year:2026,monthlyStatus:{}}],
  variable:[{id:'v1',concept:'Super',category:'comida',date:20,estimatedAmount:2200,amount:2000,card:'BBVA',paid:false,splitMode:'Cargar completo en Q2',apartadoQ1:false,apartadoQ2:true,month:5,year:2026}],
  savings:[{id:'s1',date:15,quincena:'Q1',amount:2500,card:'Nu',month:5,year:2026},{id:'s2',date:30,quincena:'Q2',amount:2500,card:'Nu',month:5,year:2026}],
  savingsGoals:[],
  monthNotes:{},
  accounts:[{id:'a1',name:'Nu',type:'crédito',bank:'Nu',notes:'Tarjeta principal'},{id:'a2',name:'BBVA',type:'débito',bank:'BBVA',notes:''},{id:'a3',name:'Efectivo',type:'efectivo',bank:'',notes:'Gastos en efectivo'}],
  categories:[...DEFAULT_CATEGORIES]
};
let currentView='dashboard',deleteTarget=null,savingsFilterMode='current',savingsFilterMonth=state.currentMonth,showSavingsForm=true,editingSavingId='';
try{const saved=localStorage.getItem(STORAGE_KEY);if(saved)state=JSON.parse(saved);}catch(e){}
if(!state.config.yearEndExtras) state.config.yearEndExtras={bonusEstimated:0,bonusReal:0,savingsFundEstimated:0,savingsFundReal:0,otherName:'Otro extra',otherEstimated:0,otherReal:0,notes:''};
if(!state.config.payrollOverrides || typeof state.config.payrollOverrides!=='object') state.config.payrollOverrides={};
if(typeof state.config.savingsStartMonth==='undefined') state.config.savingsStartMonth=state.currentMonth??0;
if(typeof state.config.savingsStartYear==='undefined') state.config.savingsStartYear=state.currentYear??new Date().getFullYear();
if(!state.config.yearEndExtras.otherName) state.config.yearEndExtras.otherName='Otro extra';
if(!state.savingsGoals || !Array.isArray(state.savingsGoals)) state.savingsGoals=[];
if(!state.monthNotes || typeof state.monthNotes!=='object') state.monthNotes={};
if(!Array.isArray(state.fixed)) state.fixed=[];
if(!Array.isArray(state.installments)) state.installments=[];
if(!Array.isArray(state.variable)) state.variable=[];
if(!Array.isArray(state.savings)) state.savings=[];
if(!Array.isArray(state.accounts)) state.accounts=[];
if(!Array.isArray(state.categories)) state.categories=[...DEFAULT_CATEGORIES];
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function fmt(n){
  const value=Number(n)||0;
  const hasDecimals=Math.abs(value%1)>0.000001;
  return '$'+value.toLocaleString('es-MX',{minimumFractionDigits:hasDecimals?2:0,maximumFractionDigits:2});
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function getDaysInMonth(m,y){return new Date(y,m+1,0).getDate();}
function getFirstDayOfMonth(m,y){const d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function monthIndex(m,y){return y*12+m;} function monthKey(m,y){return `${y}-${m}`;}
function pad2(n){return String(n).padStart(2,'0');}
function isoDate(y,m,d){return `${y}-${pad2(m+1)}-${pad2(d)}`;}
function formatShortDate(iso){
  if(!iso)return '';
  const [y,m,d]=String(iso).split('-').map(Number);
  if(!y||!m||!d)return '';
  return `${d} ${MONTHS[m-1].slice(0,3).toLowerCase()}`;
}
function formatLongDateFromParts(day,month,year){
  const d=Math.max(1,Math.min(parseInt(day)||1,getDaysInMonth(month,year)));
  return `${d} de ${MONTHS[month].toLowerCase()}`;
}
function getRealPaymentMonthYearForQuincena(item,q,m=state.currentMonth,y=state.currentYear){
  if(getSplitMode(item)==='Q2 anterior + Q1 del mes de pago' && q===2){
    return addMonthOffset(m,y,1);
  }
  return {month:m,year:y};
}
function getPaymentDueLabel(item,q,m=state.currentMonth,y=state.currentYear){
  const due=getRealPaymentMonthYearForQuincena(item,q,m,y);
  return formatLongDateFromParts(item.date||1,due.month,due.year);
}
function getItemSetAsideDateLabel(item,q,m=state.currentMonth,y=state.currentYear){
  const day=getPaymentDayForQuincena(item,q);
  const safeDay=Math.max(1,Math.min(parseInt(day)||1,getDaysInMonth(m,y)));
  return `${safeDay} de ${MONTHS[m].toLowerCase()}`;
}
function getUpcomingSubtitle(item,q,status,m=state.currentMonth,y=state.currentYear){
  if(status==='pagado')return `Q${q} · pago completado`;
  if(status==='apartado')return `Q${q} · apartado listo`;
  return `Q${q} · apartado estimado ${getItemSetAsideDateLabel(item,q,m,y)}`;
}
function payrollOverrideKey(m=state.currentMonth,y=state.currentYear){return `${y}-${m}`;}
function getPayrollOverride(q,m=state.currentMonth,y=state.currentYear){
  const key=payrollOverrideKey(m,y);
  return state.config.payrollOverrides?.[key]?.[`q${q}`]||'';
}
function getPayrollDefaultDate(q,m=state.currentMonth,y=state.currentYear){
  const day=q===1?(parseInt(state.config.payDate1)||1):(parseInt(state.config.payDate2)||16);
  return isoDate(y,m,Math.min(day,getDaysInMonth(m,y)));
}
function getPayrollDate(q,m=state.currentMonth,y=state.currentYear){return getPayrollOverride(q,m,y)||getPayrollDefaultDate(q,m,y);}
function getPayrollDateLabel(q,m=state.currentMonth,y=state.currentYear){
  const isReal=!!getPayrollOverride(q,m,y);
  return `${isReal?'depósito real':'depósito estimado'} ${formatShortDate(getPayrollDate(q,m,y))}`;
}
function renderPayrollMonthControl(){
  const q1Real=!!getPayrollOverride(1,state.currentMonth,state.currentYear);
  const q2Real=!!getPayrollOverride(2,state.currentMonth,state.currentYear);
  return `<div class="flex items-center gap-2 bg-white border border-gray-100 rounded-xl px-3 py-2 card-shadow">
    <div class="text-[11px] leading-tight"><span class="block text-gray-400">Q1 ${q1Real?'real':'estimado'}</span><b class="text-lila-500">${formatShortDate(getPayrollDate(1))}</b></div>
    <div class="w-px h-7 bg-gray-100"></div>
    <div class="text-[11px] leading-tight"><span class="block text-gray-400">Q2 ${q2Real?'real':'estimado'}</span><b class="text-lila-500">${formatShortDate(getPayrollDate(2))}</b></div>
    <button onclick="openPayrollMonthModal()" class="ml-1 w-8 h-8 rounded-lg bg-lila-50 text-lila-500 hover:bg-lila-100 flex items-center justify-center" title="Editar fechas reales de nómina del mes"><i data-lucide="settings" class="w-4 h-4"></i></button>
  </div>`;
}
function totalArr(arr,field='amount'){return (arr||[]).reduce((s,p)=>s+(parseFloat(p[field])||0),0);}
function isSavingConfirmed(s){return s && s.confirmed===true;}
function getSavingPlannedAmount(s){return parseFloat(s?.plannedAmount ?? s?.amount)||0;}
function getSavingRealAmount(s){return isSavingConfirmed(s)?(parseFloat(s?.amount)||getSavingPlannedAmount(s)):0;}
function confirmedSavings(list=state.savings){return (list||[]).filter(isSavingConfirmed);}
function totalConfirmedSavings(list=state.savings){return confirmedSavings(list).reduce((s,p)=>s+getSavingRealAmount(p),0);}
function normalizeQuincena(v,date){const x=String(v||'').toLowerCase().trim();if(x==='q1'||x==='1'||x.includes('1'))return 'Q1';if(x==='q2'||x==='2'||x.includes('2'))return 'Q2';return (parseInt(date)||1)<=15?'Q1':'Q2';}
function getAccounts(){return state.accounts||[];} function getAccountOptions(selected=''){const a=getAccounts();if(!a.length)return '<option value="">Primero agrega una tarjeta/cuenta en Configuración</option>';return a.map(x=>`<option value="${escapeHtml(x.name)}" ${selected===x.name?'selected':''}>${escapeHtml(x.name)}</option>`).join('');}
function getCategories(){
  if(!state.categories || !Array.isArray(state.categories)) state.categories=[...DEFAULT_CATEGORIES];
  const used=[...state.fixed,...state.variable].map(i=>i.category).filter(Boolean);
  return [...new Set([...state.categories,...used])];
}
function getCategoryOptions(selected=''){
  return getCategories().map(c=>`<option value="${escapeHtml(c)}" ${selected===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
}
function addCategoryIfNeeded(name){
  const clean=String(name||'').trim().toLowerCase();
  if(!clean) return '';
  if(!state.categories || !Array.isArray(state.categories)) state.categories=[...DEFAULT_CATEGORIES];
  if(!state.categories.includes(clean)) state.categories.push(clean);
  return clean;
}
function isFixedActiveInMonth(item,m,y){const sm=item.startMonth??item.month??0,sy=item.startYear??item.year??state.currentYear;if(monthIndex(m,y)<monthIndex(sm,sy))return false;if(item.hasEndDate){const em=item.endMonth??sm,ey=item.endYear??sy;if(monthIndex(m,y)>monthIndex(em,ey))return false;}return true;}
function getFixedStatus(item,m=state.currentMonth,y=state.currentYear){if(!item.monthlyStatus)item.monthlyStatus={};const k=monthKey(m,y);if(!item.monthlyStatus[k])item.monthlyStatus[k]={apartadoQ1:false,apartadoQ2:false,paid:false};return item.monthlyStatus[k];}
function getFixedPeriodText(item){const sm=item.startMonth??item.month??0,sy=item.startYear??item.year??state.currentYear;if(!item.hasEndDate)return `${MONTHS[sm]} ${sy} · sin fecha límite`;return `${MONTHS[sm]} ${sy} - ${MONTHS[item.endMonth??sm]} ${item.endYear??sy}`;}
function getInstallmentNumberForMonth(item,m,y){const sm=item.startMonth??item.month??0,sy=item.startYear??item.year??state.currentYear;return monthIndex(m,y)-monthIndex(sm,sy)+1;}
function isInstallmentActiveInMonth(item,m,y){const total=parseInt(item.totalMonths)||1,n=getInstallmentNumberForMonth(item,m,y);return n>=1&&n<=total;}
function getInstallmentStatus(item,m=state.currentMonth,y=state.currentYear){if(!item.monthlyStatus)item.monthlyStatus={};const k=monthKey(m,y);if(!item.monthlyStatus[k])item.monthlyStatus[k]={apartadoQ1:false,apartadoQ2:false,paid:false};return item.monthlyStatus[k];}
function getPaidInstallmentMonthsUntil(item,m=state.currentMonth,y=state.currentYear){
  const total=parseInt(item.totalMonths)||1;
  const sm=item.startMonth??item.month??0, sy=item.startYear??item.year??state.currentYear;
  let paid=0;
  for(let n=1;n<=total;n++){
    const idx=monthIndex(sm,sy)+n-1;
    const cm=((idx%12)+12)%12, cy=Math.floor(idx/12);
    if(monthIndex(cm,cy)>monthIndex(m,y)) break;
    if(item.monthlyStatus&&item.monthlyStatus[monthKey(cm,cy)]&&item.monthlyStatus[monthKey(cm,cy)].paid) paid++;
  }
  return paid;
}
function getInstallmentTrackerMonths(item){
  const total=parseInt(item.totalMonths)||1;
  const sm=item.startMonth??item.month??0, sy=item.startYear??item.year??state.currentYear;
  const currentRaw=getInstallmentNumberForMonth(item,state.currentMonth,state.currentYear);
  return Array.from({length:total},(_,i)=>{
    const idx=monthIndex(sm,sy)+i;
    const m=((idx%12)+12)%12, y=Math.floor(idx/12), k=monthKey(m,y);
    const paid=!!(item.monthlyStatus&&item.monthlyStatus[k]&&item.monthlyStatus[k].paid);
    const isCurrent=currentRaw===i+1;
    return {n:i+1,month:m,year:y,paid,isCurrent,label:`${MONTHS[m]} ${y}`};
  });
}
function renderInstallmentMonthTracker(item){
  const months=getInstallmentTrackerMonths(item);
  const paidCount=months.filter(m=>m.paid).length;
  const chips=months.map(m=>{
    const cls=m.paid?'bg-menta-50 border-menta-200 text-menta-600':m.isCurrent?'bg-lila-50 border-lila-200 text-lila-600':'bg-gray-50 border-gray-100 text-gray-400';
    const icon=m.paid?'✓':m.n;
    return `<div title="${m.label}" class="w-9 h-9 rounded-lg border ${cls} flex flex-col items-center justify-center leading-none shrink-0"><span class="text-[11px] font-bold">${icon}</span><span class="text-[8px] mt-0.5">${MONTHS[m.month].slice(0,3)}</span></div>`;
  }).join('');
  return `<div class="mb-2.5 bg-gray-50/70 border border-gray-100 rounded-xl p-2.5"><div class="flex items-center justify-between mb-2"><span class="text-[11px] font-semibold text-gray-500 flex items-center gap-1.5"><i data-lucide="list-checks" class="w-3.5 h-3.5 text-menta-500"></i>Tracker de mensualidades</span><span class="text-[10px] text-gray-400 font-semibold">${paidCount}/${months.length} pagadas</span></div><div class="flex flex-wrap gap-1.5">${chips}</div></div>`;
}
function getOffsetCoverageForInstallment(item,m=state.currentMonth,y=state.currentYear){
  if(getSplitMode(item)!=='Q2 anterior + Q1 del mes de pago')return null;
  if(!isInstallmentActiveInMonth(item,m,y))return null;
  const prev=addMonthOffset(m,y,-1);
  const prevTemp={...item,__collection:'installments',__viewMonth:prev.month,__viewYear:prev.year};
  const currTemp={...item,__collection:'installments',__viewMonth:m,__viewYear:y};
  const prevPlan=getAmountToSetAside(prevTemp,2);
  const currPlan=getAmountToSetAside(currTemp,1);
  if(prevPlan<=0&&currPlan<=0)return null;
  const prevStatus=getInstallmentStatus(item,prev.month,prev.year);

function getBiweeklyHealth(free, usedPct){
  if (free < 0) return { label:'Revisar', cls:'bg-red-50 text-red-500 border-red-100', dot:'bg-red-400', note:'quincena pesada' };
  if (usedPct >= 85) return { label:'Justa', cls:'bg-durazno-50 text-durazno-500 border-durazno-100', dot:'bg-durazno-400', note:'poco margen libre' };
  if (usedPct >= 55) return { label:'Estable', cls:'bg-rosa-50 text-rosa-500 border-rosa-100', dot:'bg-rosa-400', note:'controlada' };
  return { label:'Saludable', cls:'bg-aqua-50 text-aqua-500 border-aqua-200', dot:'bg-aqua-500', note:'buen margen libre' };

function getYearBiweeklyData(){
  const salary = state.config.salaryBiweekly || 0;
  return MONTHS.map((name,month)=>{
    const p=getPaymentsForMonth(month,state.currentYear), all=[...p.fixed,...p.inst,...p.vari,...(p.goals||[]),...makeSavingsPlanningItems(p)];

  });
}

function getSavingsForFilter(){if(savingsFilterMode==='all')return state.savings;const m=savingsFilterMode==='choose'?savingsFilterMonth:state.currentMonth;return state.savings.filter(s=>s.month===m&&s.year===state.currentYear);}function setSavingsFilter(mode){savingsFilterMode=mode;if(mode==='current')savingsFilterMonth=state.currentMonth;renderSavingsView();lucide.createIcons();}function setSavingsFilterMonth(v){savingsFilterMonth=parseInt(v);savingsFilterMode='choose';renderSavingsView();lucide.createIcons();}function toggleSavingsForm(){showSavingsForm=!showSavingsForm;editingSavingId='';renderSavingsView();lucide.createIcons();}function editSavingInline(id){editingSavingId=id;showSavingsForm=true;renderSavingsView();lucide.createIcons();}

  }).join('')||'<tr><td colspan="9" class="py-4 text-center text-gray-400 text-sm">Sin registros de ahorro</td></tr>';

d-lg bg-lila-500 text-white text-xs font-semibold">+ Nueva meta</button></div><div class="grid grid-cols-2 gap-3">${renderSavingsGoalCards(activeGoals)}</div></div><div class="grid grid-cols-12 gap-4"><div class="col-span-8 bg-white rounded-xl card-shadow p-5"><h3 class="font-bold mb-4">Registros de ahorro</h3><div class="flex gap-2 mb-4"><button onclick="setSavingsFilter('current')" class="text-xs px-3 py-1.5 rounded-lg ${savingsFilterMode==='current'?'bg-lila-500 text-white':'bg-lila-100 text-lila-500'} font-semibold">Ver mes actual</button><button onclick="setSavingsFilter('all')" class="text-xs px-3 py-1.5 rounded-lg ${savingsFilterMode==='all'?'bg-lila-500 text-white':'bg-gray-100 text-gray-600'} font-semibold">Ver todos los meses</button><select onchange="setSavingsFilterMonth(this.value)" class="text-xs px-3 py-1.5 rounded-lg bg-white border border-gray-200"><option>Elegir mes</option>${MONTHS.map((m,i)=>`<option value="${i}" ${savingsFilterMode==='choose'&&savingsFilterMonth===i?'selected':''}>${m}</option>`).join('')}</select></div><div class="overflow-hidden"><table class="w-full table-fixed"><colgroup><col style="width:6%"><col style="width:10%"><col style="width:6%"><col style="width:13%"><col style="width:13%"><col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:16%"></colgroup><thead><tr class="bg-gray-50"><th class="p-2 text-left text-[11px]">Día</th><th class="p-2 text-left text-[11px]">Mes</th><th class="p-2 text-left text-[11px]">Q</th><th class="p-2 text-left text-[11px]">Meta planeada</th><th class="p-2 text-left text-[11px]">Real guardado</th><th class="p-2 text-left text-[11px]">Meta</th><th class="p-2 text-left text-[11px]">Cuenta</th><th class="p-2 text-center text-[11px]">Estado</th><th class="p-2 text-center text-[11px]">Acción</th></tr></thead><tbody>${rows}</tbody></table></div><button class="w-full text-center text-xs text-lila-500 font-semibold py-3">Cargar más</button><div class="bg-azul-50 border border-azul-100 rounded-lg p-3 text-xs text-azul-500 mt-3">Los ahorros se registran en el mes que selecciones. El resumen de arriba muestra solo el mes actual seleccionado.</div></div><div class="col-span-4">${form}</div></div>`;
}
function renderSavingsGoalCards(goals){
  if(!goals.length) return `<div class="col-span-2 bg-gray-50 border border-gray-100 rounded-xl p-5 text-center text-sm text-gray-400">No hay metas activas en ${MONTHS[state.currentMonth]} ${state.currentYear}. Crea una meta con fecha de inicio y final para que aparezca aquí.</div>`;
  return goals.map(goal=>{const p=getSavingsGoalProgress(goal,state.currentMonth,state.currentYear),pace=getSavingsGoalPace(goal,state.currentMonth,state.currentYear);return `<div class="bg-lila-50 border border-lila-100 rounded-2xl p-4"><div class="flex items-start justify-between gap-3 mb-3"><div><h4 class="font-bold text-gray-800">${escapeHtml(goal.name)}</h4><p class="text-xs text-gray-400">${MONTHS[goal.startMonth]} ${goal.startYear} - ${MONTHS[goal.endMonth]} ${goal.endYear}</p><span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full border ${pace.cls} mt-2"><i data-lucide="${pace.icon}" class="w-3 h-3"></i>${pace.label}</span></div><div class="flex gap-1"><button onclick="openSavingsGoalModal('${goal.id}')" class="text-xs px-2 py-1 bg-white text-lila-600 rounded border border-lila-100">Editar</button><button onclick="deleteSavingsGoal('${goal.id}')" class="text-xs px-2 py-1 bg-red-50 text-red-500 rounded border border-red-100">Borrar</button></div></div><div class="grid grid-cols-3 gap-2 text-[11px] mb-3"><div class="bg-white/70 rounded-lg p-2"><span class="text-gray-400">Objetivo</span><div class="font-bold text-lila-500">${fmt(p.total)}</div></div><div class="bg-white/70 rounded-lg p-2"><span class="text-gray-400">Ahorrado</span><div class="font-bold text-azul-500">${fmt(p.saved)}</div></div><div class="bg-white/70 rounded-lg p-2"><span class="text-gray-400">Falta</span><div class="font-bold text-durazno-500">${fmt(p.missing)}</div></div></div><div class="flex justify-between text-[11px] text-gray-500 mb-1"><span>Avance total</span><b>${p.pct}%</b></div><div class="w-full bg-white h-2 rounded-full overflow-hidden mb-3"><div class="bg-lila-400 h-2 rounded-full" style="width:${Math.max(3,p.pct)}%"></div></div><div class="grid grid-cols-3 gap-2 text-[11px]"><div><span class="text-gray-400">Sugerido mensual</span><div class="font-bold text-menta-500">${fmt(p.monthlyTarget)}</div></div><div><span class="text-gray-400">Este mes</span><div class="font-bold text-azul-500">${fmt(p.savedThisMonth)}</div></div><div><span class="text-gray-400">Plan</span><div class="font-bold text-lila-500">${goal.planType==='biweekly'?`${fmt(goal.planAmount||0)} / quincena`:`${fmt(goal.planAmount||0)} / mes`}</div></div></div>${goal.notes?`<div class="text-[11px] text-gray-500 mt-3 bg-white/60 rounded-lg p-2">${escapeHtml(goal.notes)}</div>`:''}</div>`;}).join('');
}
function openSavingsGoalModal(id=''){const goal=(state.savingsGoals||[]).find(g=>g.id===id);document.getElementById('modalContent').innerHTML=`<div class="p-5"><div class="flex justify-between mb-4"><h3 class="font-bold flex items-center gap-2"><i data-lucide="target" class="w-4 h-4 text-lila-500"></i>${goal?'Editar':'Nueva'} meta de ahorro</h3><button onclick="closeModal()" class="text-xl text-gray-400 hover:text-gray-600 leading-none">×</button></div><form class="space-y-3" onsubmit="saveSavingsGoal(event,'${goal?.id||''}')"><div><label class="block text-xs mb-1">Nombre de la meta</label><input name="name" value="${escapeHtml(goal?.name||'')}" placeholder="Ej. Viaje, mudanza, laptop" class="w-full border rounded-lg px-3 py-2 text-sm"></div><div><label class="block text-xs mb-1">Monto objetivo</label><input type="number" step="any" name="amount" value="${goal?.amount||0}" class="w-full border rounded-lg px-3 py-2 text-sm"></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-xs mb-1">Mes de inicio</label><select name="startMonth" class="w-full border rounded-lg px-3 py-2 text-sm">${MONTHS.map((m,i)=>`<option value="${i}" ${(goal?.startMonth??state.currentMonth)===i?'selected':''}>${m}</option>`).join('')}</select></div><div><label class="block text-xs mb-1">Año de inicio</label><input type="number" name="startYear" value="${goal?.startYear??state.currentYear}" class="w-full border rounded-lg px-3 py-2 text-sm"></div></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-xs mb-1">Mes final</label><select name="endMonth" class="w-full border rounded-lg px-3 py-2 text-sm">${MONTHS.map((m,i)=>`<option value="${i}" ${(goal?.endMonth??state.currentMonth)===i?'selected':''}>${m}</option>`).join('')}</select></div><div><label class="block text-xs mb-1">Año final</label><input type="number" name="endYear" value="${goal?.endYear??state.currentYear}" class="w-full border rounded-lg px-3 py-2 text-sm"></div></div><div><label class="block text-xs mb-1">Plan de ahorro</label><select name="planType" class="w-full border rounded-lg px-3 py-2 text-sm"><option value="monthly" ${(!goal?.planType||goal?.planType==='monthly')?'selected':''}>Ahorrar por mes</option><option value="biweekly" ${goal?.planType==='biweekly'?'selected':''}>Ahorrar por quincena</option></select><p class="text-[11px] text-gray-400 mt-1">Si eliges por mes, se divide en Q1 y Q2. Si eliges por quincena, esa cantidad aparece en cada quincena.</p></div><div><label class="block text-xs mb-1">Cantidad a apartar según el plan</label><input type="number" step="any" name="planAmount" value="${goal?.planAmount||0}" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Ej. 1000"></div><div><label class="block text-xs mb-1">Cuenta sugerida</label><select name="card" class="w-full border rounded-lg px-3 py-2 text-sm">${getAccountOptions(goal?.card||'')}</select></div><div><label class="block text-xs mb-1">Notas</label><textarea name="notes" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Ej. objetivo, fechas, detalles del viaje">${escapeHtml(goal?.notes||'')}</textarea></div><div class="flex gap-2 pt-2"><button class="flex-1 bg-lila-500 text-white rounded-lg py-2 text-sm font-semibold">Guardar meta</button><button type="button" onclick="closeModal()" class="px-4 py-2 rounded-lg bg-gray-100 text-sm">Cancelar</button></div></form></div>`;document.getElementById('modal').classList.remove('hidden');lucide.createIcons();}
function saveSavingsGoal(event,id=''){event.preventDefault();const fd=new FormData(event.target),payload={name:fd.get('name')||'Meta de ahorro',amount:parseFloat(fd.get('amount'))||0,startMonth:parseInt(fd.get('startMonth'))||0,startYear:parseInt(fd.get('startYear'))||state.currentYear,endMonth:parseInt(fd.get('endMonth'))||0,endYear:parseInt(fd.get('endYear'))||state.currentYear,card:fd.get('card')||'',planType:fd.get('planType')||'monthly',planAmount:parseFloat(fd.get('planAmount'))||0,notes:fd.get('notes')||''};if(monthIndex(payload.endMonth,payload.endYear)<monthIndex(payload.startMonth,payload.startYear)){payload.endMonth=payload.startMonth;payload.endYear=payload.startYear;}if(id){const g=state.savingsGoals.find(x=>x.id===id);if(g)Object.assign(g,payload);}else state.savingsGoals.push({id:uid(),...payload});saveState();closeModal();render();}
function deleteSavingsGoal(id){if(!confirm('¿Eliminar esta meta de ahorro? Los ahorros guardados se quedan, pero pasarán a ahorro general.'))return;state.savingsGoals=state.savingsGoals.filter(g=>g.id!==id);state.savings.forEach(s=>{if(s.goalId===id)s.goalId='';});saveState();render();}
function renderSavingPanelForm(id='',isModal=false){
  const item=state.savings.find(s=>s.id===id);
  const suggestedAmount=(parseFloat(state.config.savingsGoal)||0)/2;
  const cancelAction=isModal?'closeModal()':"editingSavingId=''; renderSavingsView(); lucide.createIcons();";
  const plannedValue=item?getSavingPlannedAmount(item):suggestedAmount;
  const realValue=item?(parseFloat(item.amount)||''):'';
  const checked=isSavingConfirmed(item);
  return `<div class="bg-white rounded-xl card-shadow p-4 sticky top-5">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-gray-800 flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4 text-azul-400"></i>${item?'Editar ahorro':'Nuevo ahorro'}</h3>
      <button type="button" onclick="${cancelAction}" class="text-gray-400 hover:text-gray-600">×</button>
    </div>
    <form class="space-y-3" onsubmit="saveSavingForm(event,'${item?.id||''}')">
      <div><label class="block text-xs mb-1">Día del mes</label><input type="number" name="date" min="1" max="31" value="${item?.date||1}" class="w-full border rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="block text-xs mb-1">Mes del ahorro</label><select name="month" class="w-full border rounded-lg px-3 py-2 text-sm">${MONTHS.map((m,i)=>`<option value="${i}" ${(item?.month??state.currentMonth)===i?'selected':''}>${m}</option>`).join('')}</select></div>
      <div><label class="block text-xs mb-1">Quincena</label><select name="quincena" class="w-full border rounded-lg px-3 py-2 text-sm"><option value="Q1" ${normalizeQuincena(item?.quincena,item?.date)==='Q1'?'selected':''}>Q1</option><option value="Q2" ${normalizeQuincena(item?.quincena,item?.date)==='Q2'?'selected':''}>Q2</option></select></div>
      <div><label class="block text-xs mb-1">Meta de ahorro</label><select name="goalId" class="w-full border rounded-lg px-3 py-2 text-sm">${getSavingsGoalOptions(item?.goalId||'')}</select></div>
      <div><label class="block text-xs mb-1">Meta / planeado</label><input type="number" step="any" name="plannedAmount" value="${plannedValue}" class="w-full border rounded-lg px-3 py-2 text-sm"><p class="text-[11px] text-gray-400 mt-1">Es lo que pensabas juntar. Queda como recordatorio y no se suma como ahorro real.</p></div>
      <div><label class="block text-xs mb-1">Real guardado</label><input type="number" step="any" name="amount" value="${realValue}" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="Puede ser igual, mayor o menor"><p class="text-[11px] text-gray-400 mt-1">Es lo que ya juntaste/guardaste. Solo este monto se suma cuando el estado está cumplido.</p></div>
      <div><label class="block text-xs mb-1">Cuenta donde se guardó</label><select name="card" class="w-full border rounded-lg px-3 py-2 text-sm">${getAccountOptions(item?.card||'')}</select></div>
      <div><label class="block text-xs mb-1">Estado del ahorro</label><select name="confirmed" class="w-full border rounded-lg px-3 py-2 text-sm"><option value="false" ${!checked?'selected':''}>Planeado / estimado</option><option value="true" ${checked?'selected':''}>Cumplido / ya guardado</option></select><p class="text-[11px] text-gray-400 mt-1">Si lo marcas cumplido y dejas vacío el real guardado, se usará la meta/planeado.</p></div>
      <div class="flex gap-2 pt-2"><button class="flex-1 bg-lila-500 text-white rounded-lg py-2 text-sm font-semibold">${item?'Guardar':'Agregar'}</button><button type="button" onclick="${cancelAction}" class="px-4 py-2 rounded-lg bg-gray-100 text-sm">Cancelar</button></div>
    </form>
  </div>`;
}
function saveSavingForm(event,id=''){event.preventDefault();const fd=new FormData(event.target);const planned=parseFloat(fd.get('plannedAmount'))||0;const confirmed=fd.get('confirmed')==='true';const realInput=fd.get('amount');const real=realInput===''||realInput===null?planned:(parseFloat(realInput)||0);const payload={date:parseInt(fd.get('date'))||1,month:parseInt(fd.get('month')),year:state.currentYear,quincena:normalizeQuincena(fd.get('quincena'),fd.get('date')),goalId:fd.get('goalId')||'',plannedAmount:planned,amount:real,card:fd.get('card')||'',confirmed};if(Number.isNaN(payload.month))payload.month=state.currentMonth;if(id){const item=state.savings.find(s=>s.id===id);if(item)Object.assign(item,payload);}else state.savings.push({id:uid(),...payload});editingSavingId='';saveState();closeModal();render();}
function toggleSavingConfirmed(id){const item=state.savings.find(s=>s.id===id);if(!item)return;if(!isSavingConfirmed(item)&&!(parseFloat(item.amount)>0))item.amount=getSavingPlannedAmount(item);item.confirmed=!isSavingConfirmed(item);saveState();render();}

function updatePayrollOverride(q,value){

  const key=payrollOverrideKey();
  if(!state.config.payrollOverrides[key])state.config.payrollOverrides[key]={};
  if(value)state.config.payrollOverrides[key][`q${q}`]=value;
  else delete state.config.payrollOverrides[key][`q${q}`];
  saveState();render();
}

function savePayrollMonthForm(event){
  event.preventDefault();
  const fd=new FormData(event.target);
  updatePayrollOverrideSilent(1,fd.get('q1')||'');
  updatePayrollOverrideSilent(2,fd.get('q2')||'');
  saveState();closeModal();render();

function updatePayrollOverrideSilent(q,value){
  if(!state.config.payrollOverrides)state.config.payrollOverrides={};
  const key=payrollOverrideKey();
  if(!state.config.payrollOverrides[key])state.config.payrollOverrides[key]={};
  if(value)state.config.payrollOverrides[key][`q${q}`]=value;
  else delete state.config.payrollOverrides[key][`q${q}`];
}
function getSavingsGoalMonthsInYear(year=state.currentYear){
  const sm=parseInt(state.config.savingsStartMonth)||0;
  const sy=parseInt(state.config.savingsStartYear)||year;
  if(year<sy)return 0;
  if(year>sy)return 12;
  return Math.max(0,12-sm);
}
function getAnnualSavingsGoalStats(year=state.currentYear){
  const monthly=parseFloat(state.config.savingsGoal)||0;
  const biweekly=monthly/2;
  const activeMonths=getSavingsGoalMonthsInYear(year);
  const estimated=monthly*activeMonths;
  const real=(state.savings||[]).filter(s=>s.year===year&&!s.goalId&&isSavingConfirmed(s)).reduce((sum,s)=>sum+getSavingRealAmount(s),0);
  const planned=(state.savings||[]).filter(s=>s.year===year&&!s.goalId&&!isSavingConfirmed(s)).reduce((sum,s)=>sum+getSavingPlannedAmount(s),0);
  const diff=real-estimated;
  return {monthly,biweekly,activeMonths,estimated,real,planned,diff,missing:Math.max(0,estimated-real)};
}
function getGoalAnnualStats(goal,year=state.currentYear){
  const start=monthIndex(goal.startMonth??0,goal.startYear??year);
  const end=monthIndex(goal.endMonth??goal.startMonth??0,goal.endYear??goal.startYear??year);
  const yStart=monthIndex(0,year), yEnd=monthIndex(11,year);
  const overlapStart=Math.max(start,yStart), overlapEnd=Math.min(end,yEnd);
  const activeMonths=overlapEnd>=overlapStart?(overlapEnd-overlapStart+1):0;
  const totalMonths=Math.max(1,end-start+1);
  const objective=parseFloat(goal.amount)||0;
  const monthlyTarget=objective/totalMonths;
  const estimated=monthlyTarget*activeMonths;
  const real=(state.savings||[]).filter(s=>s.year===year&&s.goalId===goal.id&&isSavingConfirmed(s)).reduce((sum,s)=>sum+getSavingRealAmount(s),0);
  const planned=(state.savings||[]).filter(s=>s.year===year&&s.goalId===goal.id&&!isSavingConfirmed(s)).reduce((sum,s)=>sum+getSavingPlannedAmount(s),0);
  const diff=real-estimated;
  const pct=estimated?Math.round((real/estimated)*100):0;
  return {objective,monthlyTarget,activeMonths,estimated,real,planned,diff,missing:Math.max(0,estimated-real),pct};
}

      </div>
      <div class="flex justify-between text-[11px] text-gray-400 mb-1"><span>Avance contra meta anual estimada</span><b class="text-gray-600">${g.pct}%</b></div>
      <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div class="${g.diff>=0?'bg-menta-400':'bg-azul-400'} h-2 rounded-full" style="width:${Math.min(100,Math.max(3,g.pct))}%"></div></div>
      <div class="grid grid-cols-3 gap-2 text-[10px] text-gray-400 mt-2">
        <div>Meses considerados: <b class="text-gray-600">${g.activeMonths}</b></div>

      </div>
    </div>`;
  }).join('')||`<div class="bg-gray-50 border border-gray-100 rounded-xl p-4 text-sm text-gray-400 text-center">Aún no tienes metas extra activas en ${state.currentYear}. Cuando crees una meta como viaje, laptop o mudanza, aparecerá aquí con su avance anual.</div>`;
  return `<div class="bg-white rounded-2xl card-shadow border border-gray-100 p-5 mb-4">
    <div class="flex items-start justify-between gap-3 mb-4">
      <div>
        <h3 class="font-bold text-gray-800 flex items-center gap-2"><i data-lucide="piggy-bank" class="w-5 h-5 text-azul-500"></i>Resumen anual de ahorro</h3>
        <p class="text-sm text-gray-400 mt-1">Desglose separado del ahorro general y de cada meta extra registrada.</p>
      </div>
      <span class="text-[11px] px-3 py-1 rounded-full bg-azul-50 text-azul-500 border border-azul-100">General desde: ${startLabel}</span>
    </div>

      <div class="flex items-start justify-between gap-3 mb-3">
        <div><h4 class="font-bold text-gray-800">Ahorro general</h4><p class="text-xs text-gray-400">Solo registros guardados como General. No mezcla metas extra.</p></div>
        <span class="text-[10px] px-2 py-0.5 rounded-full ${st.diff>=0?'bg-menta-50 text-menta-500 border-menta-100':'bg-durazno-50 text-durazno-500 border-durazno-100'} border">${st.diff>=0?'Arriba de meta':'Debajo de meta'}</span>
      </div>

        <div class="bg-white/80 rounded-lg p-2"><span class="text-gray-400">Real general</span><div class="font-bold text-menta-500">${fmt(st.real)}</div></div>

      <div class="w-full bg-white h-2 rounded-full overflow-hidden"><div class="bg-azul-400 h-2 rounded-full" style="width:${Math.min(100,Math.max(3,generalPct))}%"></div></div>
      <div class="grid grid-cols-3 gap-2 text-[10px] text-gray-400 mt-2"><div>Meses considerados: <b class="text-gray-600">${st.activeMonths}</b></div><div>Inicio: <b class="text-azul-500">${startLabel}</b></div><div>Diferencia: <b class="${st.diff>=0?'text-menta-500':'text-durazno-500'}">${st.diff>=0?'+':'-'}${fmt(Math.abs(st.diff))}</b></div></div>

function updateYearEndExtra(k,v){
  if(!state.config.yearEndExtras) state.config.yearEndExtras={bonusEstimated:0,bonusReal:0,savingsFundEstimated:0,savingsFundReal:0,otherName:'Otro extra',otherEstimated:0,otherReal:0,notes:''};
  state.config.yearEndExtras[k]=(k==='notes'||k==='otherName')?String(v||''):(parseFloat(v)||0);
  saveState();
  render();
}
function exportBackup(){
  const payload={
    app:'Mi plan de pagos',
    version:'1.0',
    exportedAt:new Date().toISOString(),
    data:state
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`mi-plan-de-pagos-respaldo-${date}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function importBackup(event){
  const file=event.target.files&&event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      const imported=parsed.data||parsed;
      if(!imported||typeof imported!=='object'||!imported.config){alert('El archivo no parece ser un respaldo válido de Mi plan de pagos.');return;}
      if(!confirm('¿Importar este respaldo? Esto reemplazará la información actual de la app en este navegador.'))return;
      state=imported;
      if(!state.config.yearEndExtras) state.config.yearEndExtras={bonusEstimated:0,bonusReal:0,savingsFundEstimated:0,savingsFundReal:0,otherName:'Otro extra',otherEstimated:0,otherReal:0,notes:''};
      if(!state.config.yearEndExtras.otherName) state.config.yearEndExtras.otherName='Otro extra';
      if(!state.savingsGoals||!Array.isArray(state.savingsGoals)) state.savingsGoals=[];
      if(!state.monthNotes||typeof state.monthNotes!=='object') state.monthNotes={};
      if(!Array.isArray(state.fixed)) state.fixed=[];
      if(!Array.isArray(state.installments)) state.installments=[];
      if(!Array.isArray(state.variable)) state.variable=[];
      if(!Array.isArray(state.savings)) state.savings=[];
      if(!Array.isArray(state.accounts)) state.accounts=[];
      if(!state.categories||!Array.isArray(state.categories)) state.categories=[...DEFAULT_CATEGORIES];
      saveState();
      alert('Respaldo importado correctamente.');
      render();
    }catch(err){
      alert('No se pudo importar el archivo. Revisa que sea un .json válido.');
    }finally{
      event.target.value='';
    }
  };
  reader.readAsText(file);
}
function openAccountModal(id=''){const item=getAccounts().find(a=>a.id===id);document.getElementById('modalContent').innerHTML=`<div class="p-5"><div class="flex justify-between mb-4"><h3 class="font-bold">${item?'Editar':'Agregar'} tarjeta/cuenta</h3><button onclick="closeModal()" class="text-xl text-gray-400">×</button></div><form class="space-y-3" onsubmit="saveAccount(event,'${item?.id||''}')"><input name="name" value="${escapeHtml(item?.name||'')}" placeholder="Nombre personalizado" class="w-full border rounded-lg px-3 py-2"><select name="type" class="w-full border rounded-lg px-3 py-2">${ACCOUNT_TYPES.map(t=>`<option value="${t}" ${item?.type===t?'selected':''}>${t}</option>`).join('')}</select><input name="bank" value="${escapeHtml(item?.bank||'')}" placeholder="Banco o institución" class="w-full border rounded-lg px-3 py-2"><textarea name="notes" class="w-full border rounded-lg px-3 py-2" placeholder="Notas opcionales">${escapeHtml(item?.notes||'')}</textarea><button class="w-full bg-lila-500 text-white rounded-lg py-2 font-semibold">Guardar</button></form></div>`;document.getElementById('modal').classList.remove('hidden');}
function saveAccount(event,id=''){event.preventDefault();const fd=new FormData(event.target),payload={name:fd.get('name'),type:fd.get('type'),bank:fd.get('bank'),notes:fd.get('notes')};if(id){const a=state.accounts.find(x=>x.id===id);if(a)Object.assign(a,payload);}else state.accounts.push({id:uid(),...payload});saveState();closeModal();render();}
function deleteAccount(id){state.accounts=state.accounts.filter(a=>a.id!==id);saveState();render();}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});document.addEventListener('click',e=>{const pop=document.getElementById('calendarPopover');if(!pop)return;const cal=document.getElementById('miniCalendar');if(pop.contains(e.target))return;if(cal&&cal.contains(e.target)&&e.target.closest('[onclick^="openCalendarPopover"]'))return;closeCalendarPopover();});
function renderSidebar(){const p=getPaymentsForMonth(state.currentMonth,state.currentYear),ts=totalConfirmedSavings(p.sav),goal=state.config.savingsGoal||0,pct=goal?Math.min(100,Math.round(ts/goal*100)):0;document.getElementById('sidebarSavingsTitle').textContent=`Meta de ahorro · ${MONTHS[state.currentMonth]} ${state.currentYear}`;document.getElementById('sidebarSavingsGoal').textContent=fmt(goal);document.getElementById('sidebarSaved').textContent=fmt(ts);document.getElementById('sidebarProgress').style.width=pct+'%';document.getElementById('sidebarTotalSavings').textContent=fmt(totalConfirmedSavings(state.savings));}
document.getElementById('sideNav').addEventListener('click',e=>{const btn=e.target.closest('[data-view]');if(!btn)return;document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentView=btn.dataset.view;render();});
